*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Pissarro — Eragny's Garden palette */
  --bg:   #1a1510;   /* quasi nero caldo, terra scura */
  --bg2:  #201c16;   /* superficie finestre */
  --bg3:  #2a2318;   /* superficie cards/inner */
  --border:  #3a3228; /* bordi sottili */
  --border2: #4f4535; /* bordi evidenti */

  /* accento principale: beige dorato dal quadro */
  --orange:  #c4a96a;  /* beige caldo — titoli, accent */
  --orange2: #9c7e44;  /* beige scuro — bordi attivi */
  --orange3: #d9c090;  /* beige chiaro — hover */

  /* testi */
  --dim:   #6b6050;   /* testo muted */
  --text:  #d4c9b0;   /* testo principale — lino chiaro */
  --text2: #9a8e78;   /* testo secondario */

  /* colori sezione dal quadro */
  --green: #7a9e72;   /* verde foglie */
  --blue:  #8faabf;   /* cielo grigio-azzurro */
  --mauve: #a08878;   /* rosa antico mattone */
  --yellow:#c9b86c;   /* girasoli */
  --peach: #c49070;   /* fiori rosa-salmone */
  --teal:  #6e9480;   /* verde-grigio fogliame */

  --font:'JetBrains Mono',monospace;
  --gap:10px;--tb:30px;--topbar:30px;--bar:0px;
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:25px}

#wallpaper::after{
  content:'';position:absolute;inset:0;
  background:rgba(18,13,8,0.68);
  backdrop-filter:blur(0px);
  transition:background 0.4s, backdrop-filter 0.4s;
}
/* scanlines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.018) 2px,rgba(0,0,0,0.018) 4px);pointer-events:none;z-index:9999}

/* TOPBAR */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar);
  background:rgba(13,13,16,0.88);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;z-index:1000;backdrop-filter:blur(10px);user-select:none;
}
.tb-logo{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--orange);letter-spacing:1px;border:1px solid var(--orange2);padding:1px 7px;border-radius:2px}
.tb-logo span{color:var(--text2)}
.tb-wl{display:flex;gap:6px}
.ws-pill{display:flex;gap:4px;align-items:center;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:4px;padding:3px 10px;font-size:10px;color:var(--text2);cursor:pointer;transition:all 0.15s}
.ws-pill:hover{border-color:var(--orange2);color:var(--text)}
.ws-pill.active{border-color:var(--orange);color:var(--orange);background:rgba(196,169,106,0.1)}
.ws-pill .ws-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5}
.ws-pill.active .ws-dot{opacity:1}
.ws-pill.ws-occupied .ws-dot{opacity:0.8}
.tb-right{display:flex;align-items:center;gap:14px;color:var(--dim);font-size:11px}
.tb-clock{color:var(--orange);font-size:12px}
.blink{animation:blink 1.1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* DESKTOP — pure flexrow, no nested columns */
#desktop{
  position:fixed;top:var(--topbar);left:0;right:0;bottom:var(--bar);
  z-index:2;
  display:flex;flex-direction:row;
  gap:var(--gap);padding:var(--gap);
  z-index:1;
}

/* WINDOW */
.win{
  background:rgba(30,24,16,0.84);
  border:1px solid var(--border2);
  border-radius:8px;overflow:hidden;
  display:flex;flex-direction:column;
  backdrop-filter:blur(12px);
  /* smooth retile */
  transition:flex 0.26s cubic-bezier(.4,0,.2,1),
             width 0.26s cubic-bezier(.4,0,.2,1),
             border-color 0.15s, box-shadow 0.15s;
  min-width:0;min-height:0;
}
.win:hover{border-color:rgba(196,169,106,0.25)}
.win.focused{border-color:rgba(196,169,106,0.65);box-shadow:0 0 0 1px rgba(196,169,106,0.12),0 8px 32px rgba(0,0,0,0.6)}
@keyframes winIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.win{animation:winIn 0.2s ease both}

/* TITLEBAR */
.wtbar{
  height:var(--tb);background:rgba(18,14,9,0.96);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:8px;
  user-select:none;flex-shrink:0;cursor:default;
}
.wdots{display:flex;gap:5px;flex-shrink:0}
.wdot{width:11px;height:11px;border-radius:50%;cursor:pointer;transition:filter 0.12s,transform 0.1s;position:relative}
.wdot:hover{filter:brightness(1.3);transform:scale(1.1)}
.wdot:active{transform:scale(0.88)}
.wd-r{background:#2a3820}.wd-y{background:#c8c4a8}.wd-g{background:#c4a96a}
.wdots:hover .wdot::after{font-size:7px;font-weight:700;color:rgba(0,0,0,0.55);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);line-height:1}
.wdots:hover .wd-r::after{content:'✕'}
.wdots:hover .wd-y::after{content:'–'}
.wdots:hover .wd-g::after{content:'⤢'}
.wtitle{font-size:10px;color:var(--dim);flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.win.focused .wtitle{color:var(--text2)}

/* BODY */
.wbody{flex:1;overflow:auto;min-height:0;min-width:0}
.wbody::-webkit-scrollbar{width:3px}
.wbody::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* minimized — only titlebar visible, NO flex growth */
.win.wmin .wbody{display:none}

/* ── RESIZE HANDLES — tutti i bordi ── */
.win{position:relative}
.rh{position:absolute;z-index:10}
/* edges */
.rh-n{top:0;left:8px;right:8px;height:4px;cursor:n-resize}
.rh-s{bottom:0;left:8px;right:8px;height:4px;cursor:s-resize}
.rh-e{top:8px;right:0;bottom:8px;width:4px;cursor:e-resize}
.rh-w{top:8px;left:0;bottom:8px;width:4px;cursor:w-resize}
/* corners */
.rh-nw{top:0;left:0;width:10px;height:10px;cursor:nw-resize}
.rh-ne{top:0;right:0;width:10px;height:10px;cursor:ne-resize}
.rh-sw{bottom:0;left:0;width:10px;height:10px;cursor:sw-resize}
.rh-se{bottom:0;right:0;width:10px;height:10px;cursor:se-resize}
/* subtle indicator on focused window */
.win.focused .rh-se::after{
  content:'';position:absolute;bottom:3px;right:3px;
  width:6px;height:6px;
  border-right:1.5px solid var(--orange2);
  border-bottom:1.5px solid var(--orange2);
  border-radius:1px;
}

/* maximized overlay */
.win.wmax{
  position:fixed!important;
  top:calc(var(--topbar)+var(--gap))!important;
  left:var(--gap)!important;right:var(--gap)!important;
  bottom:calc(var(--bar)+var(--gap))!important;
  z-index:500;border-radius:8px;
  display:flex;flex-direction:column;
}

/* STATUSBAR */
#statusbar{
  position:fixed;bottom:0;left:0;right:0;height:var(--bar);
  background:rgba(13,13,16,0.88);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:14px;
  font-size:10px;color:var(--dim);z-index:1000;backdrop-filter:blur(10px);user-select:none;
}
.sbi{display:flex;gap:5px;align-items:center}
.sbd{width:5px;height:5px;border-radius:50%}
#tray{display:flex;gap:5px;align-items:center}
.tray-btn{font-size:10px;padding:2px 9px;border-radius:4px;cursor:pointer;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);transition:all 0.12s;white-space:nowrap}
.tray-btn:hover{border-color:var(--orange2);color:var(--orange)}

/* ── CONTENT ── */
.p{padding:14px 16px}
.pname{font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--orange);margin-bottom:4px}
.pname em{color:var(--text2);font-style:normal}
.pdiv{color:var(--border2);letter-spacing:2px;margin-bottom:8px;font-size:14px}
.prow{display:flex;gap:6px;font-size:15px;margin-bottom:2px}
.pk{color:var(--orange3);min-width:68px}.pv{color:var(--text)}.pm{color:var(--dim);font-size:12px}
.colorstrip{display:flex;gap:3px;margin-top:9px}
.cs{width:12px;height:12px;border-radius:50%}

.ctitle{font-size:13px;color:var(--orange);margin-bottom:10px;font-family:'Share Tech Mono',monospace}
.citem{display:flex;align-items:center;gap:7px;padding:8px 11px;margin-bottom:2px;border-radius:3px;cursor:pointer;font-size:15px;color:var(--text2);border:1px solid transparent;transition:all 0.12s}
.citem:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.citem.active{background:rgba(196,169,106,0.08);border-color:var(--item-c,var(--orange));color:var(--item-c,var(--orange));font-weight:500}
.citem.active .cicon{color:var(--item-c,var(--orange))}
.cicon{color:var(--orange2);width:18px}.carr{color:var(--dim);font-size:13px;margin-left:auto}
.chint{margin-top:10px;font-size:13px;color:var(--dim)}

.wlabel{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.palgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.palc{height:15px;border-radius:3px;cursor:pointer;transition:transform 0.1s}
.palc:hover{transform:scale(1.1)}
.thmicons{display:flex;gap:10px;align-items:center;margin-top:4px}
.thmi{font-size:16px;cursor:pointer;opacity:.35;transition:opacity 0.15s}
.thmi:hover,.thmi.on{opacity:1}
.thmi.on.sun{color:var(--yellow)}.thmi.on.snow{color:var(--blue)}.thmi.on.moon{color:var(--mauve)}

.ah1{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--orange);margin-bottom:12px;line-height:1.2}
.abody{font-size:15px;color:var(--text2);line-height:1.8;margin-bottom:8px}
.abody strong{color:var(--text)}
.aitalic{font-style:italic;color:var(--dim);font-size:13px;margin-bottom:16px}
.techgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:8px}
.titem{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:default;transition:transform 0.18s ease}
.titem:hover{transform:scale(1.18)}
.ticon{width:42px;height:42px;border-radius:7px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;padding:6px;transition:border-color 0.18s ease,box-shadow 0.18s ease}
.titem:hover .ticon{border-color:var(--orange);box-shadow:0 0 8px rgba(196,169,106,0.25)}
.ticon svg{width:100%;height:100%}
.tname{font-size:11px;color:var(--text2);text-align:center}
.photoframe{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;overflow:hidden;margin-bottom:10px}
.pfbar{background:var(--bg);border-bottom:1px solid var(--border);padding:3px 7px;font-size:11px;color:var(--dim)}
.pfimg{width:100%;aspect-ratio:3/4;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--border2)}
.pfcap{padding:3px 7px;font-size:8px;color:var(--dim);border-top:1px solid var(--border)}

/* ── VIEW TRANSITIONS ── */
@keyframes vt-slide-in-right {
  from { transform:translateX(100%); }
  to   { transform:translateX(0); }
}
@keyframes vt-slide-out-left {
  from { transform:translateX(0); }
  to   { transform:translateX(-100%); }
}
@keyframes vt-slide-in-left {
  from { transform:translateX(-100%); }
  to   { transform:translateX(0); }
}
@keyframes vt-slide-out-right {
  from { transform:translateX(0); }
  to   { transform:translateX(100%); }
}
html[data-vt="forward"] ::view-transition-old(ws-content){
  animation:280ms cubic-bezier(.4,0,.2,1) both vt-slide-out-left;
}
html[data-vt="forward"] ::view-transition-new(ws-content){
  animation:280ms cubic-bezier(.4,0,.2,1) both vt-slide-in-right;
}
html[data-vt="back"] ::view-transition-old(ws-content){
  animation:280ms cubic-bezier(.4,0,.2,1) both vt-slide-out-right;
}
html[data-vt="back"] ::view-transition-new(ws-content){
  animation:280ms cubic-bezier(.4,0,.2,1) both vt-slide-in-left;
}
@media(prefers-reduced-motion:reduce){
  ::view-transition-old(ws-content),::view-transition-new(ws-content){animation:none}
}

/* ══════════════════════════════════════
   TILING ENGINE
   Each window is a direct flex child of #desktop.
   flex-basis drives width, height fills the parent.
   retile() recomputes flex for every visible window.
══════════════════════════════════════ */
const desktop = document.getElementById('desktop');
const tray    = document.getElementById('tray');

/*
  Layout model:
  windows are stored in order: [left-group windows..., main-group windows...]
  left-group:  profile, contents, palette  → stacked vertically in their own sub-flex column
  main-group:  about / projects / blog / contact  → one at a time, takes remaining width

  Actually simpler: use two sub-containers, both flex children of desktop.
  BUT: when left container has 0 children, remove it entirely → main fills 100%.
*/

const leftBox = document.createElement('div');
leftBox.id = 'left-box';
leftBox.style.cssText = 'display:flex;flex-direction:column;gap:5px;width:320px;flex-shrink:0;transition:width 0.26s cubic-bezier(.4,0,.2,1),opacity 0.26s;position:relative;z-index:2';

desktop.appendChild(leftBox);

/* registry: id → { el, box, minimized, maximized } */
const wins = {};
let focusedId = null;

/* ── make window element ── */
function makeEl(id, title, html, delay) {
  const el = document.createElement('div');
  el.className = 'win';
  el.id = 'w'+id;
  el.style.animationDelay = (delay||0)+'s';
  el.innerHTML = `
    <div class="wtbar">
      <div class="wdots">
        <div class="wdot wd-r"></div>
        <div class="wdot wd-y"></div>
        <div class="wdot wd-g"></div>
      </div>
      <div class="wtitle">${title}</div>
    </div>
    <div class="wbody">${html}</div>
    <div class="rh rh-n"  data-dir="n"></div>
    <div class="rh rh-s"  data-dir="s"></div>
    <div class="rh rh-e"  data-dir="e"></div>
    <div class="rh rh-w"  data-dir="w"></div>
    <div class="rh rh-nw" data-dir="nw"></div>
    <div class="rh rh-ne" data-dir="ne"></div>
    <div class="rh rh-sw" data-dir="sw"></div>
    <div class="rh rh-se" data-dir="se"></div>`;

  const [dr,dy,dg] = el.querySelectorAll('.wdot');
  dr.onclick = e => {
    e.stopPropagation();
    if (currentWs !== '1') switchWs('1', false);
    else closeWin(id);
  };
  dy.onclick = e => { e.stopPropagation(); toggleMin(id); };
  dg.onclick = e => { e.stopPropagation(); toggleMax(id); };
  el.addEventListener('mousedown', () => focusWin(id));
  el.querySelectorAll('.citem[data-open]').forEach(i => i.addEventListener('click', () => {
    openSec(i.dataset.open);
  }));

  /* ── resize via edge handles ── */
  el.querySelectorAll('.rh').forEach(handle => {
    handle.addEventListener('pointerdown', e => {
      if (wins[id]?.maximized) return;
      e.stopPropagation(); e.preventDefault();
      handle.setPointerCapture(e.pointerId);
      focusWin(id);

      const dir    = handle.dataset.dir;
      const startX = e.clientX, startY = e.clientY;
      const rect   = el.getBoundingClientRect();
      const startW = rect.width, startH = rect.height;
      const w      = wins[id];

      // kill ALL transitions on everything for instant feedback
      document.querySelectorAll('.win,.col,#left-box,[id^=ws-main]')
        .forEach(n => n.style.transition = 'none');

      let pending = false, lastE = e;

      function apply() {
        pending = false;
        const dx = lastE.clientX - startX;
        const dy = lastE.clientY - startY;
        let newW = startW, newH = startH;
        if (dir.includes('e')) newW = Math.max(180, startW + dx);
        if (dir.includes('w')) newW = Math.max(180, startW - dx);
        if (dir.includes('s')) newH = Math.max(60,  startH + dy);
        if (dir.includes('n')) newH = Math.max(60,  startH - dy);

        if ((dir.includes('e') || dir.includes('w')) && w) {
          if (w.box === leftBox) {
            leftBox.style.width = newW + 'px';
          } else {
            el.style.flexBasis = newW + 'px';
            el.style.flexGrow  = '0';
          }
        }
        if ((dir.includes('s') || dir.includes('n')) && w) {
          el.style.flexBasis = newH + 'px';
          el.style.flexGrow  = '0';
          Array.from(w.box.children)
            .filter(c => c !== el && !c.classList.contains('wmin'))
            .forEach(s => { s.style.flexBasis = '0'; s.style.flexGrow = '1'; });
        }
      }

      function onMove(e) {
        lastE = e;
        if (!pending) { pending = true; requestAnimationFrame(apply); }
      }

      function onUp() {
        handle.releasePointerCapture(e.pointerId);
        // restore transitions
        document.querySelectorAll('.win,.col,#left-box,[id^=ws-main]')
          .forEach(n => n.style.transition = '');
        handle.removeEventListener('pointermove', onMove);
        handle.removeEventListener('pointerup', onUp);
      }

      handle.addEventListener('pointermove', onMove);
      handle.addEventListener('pointerup', onUp);
    });
  });

  /* accent & bg pickers — delegated to global handlers below */
  return el;
}

/* ── add to a box ── */
function addWin(id, title, html, box, delay) {
  const el = makeEl(id, title, html, delay);
  box.appendChild(el);
  wins[id] = { el, box, minimized:false, maximized:false };
  retile();
  return el;
}

/* ── focus ── */
function focusWin(id) {
  Object.values(wins).forEach(w => w.el.classList.remove('focused'));
  if (wins[id]) { wins[id].el.classList.add('focused'); focusedId = id; }
}

/* ── close ── */
function closeWin(id) {
  const w = wins[id]; if (!w) return;
  w.el.style.transition = 'opacity 0.15s,transform 0.15s,flex 0.15s';
  w.el.style.opacity = '0';
  w.el.style.transform = 'scale(0.94)';
  setTimeout(() => {
    w.el.remove();
    delete wins[id];
    removeTray(id);
    retile();
  }, 160);
}

/* ── minimize ── */
function toggleMin(id) {
  const w = wins[id]; if (!w) return;
  w.minimized = !w.minimized;
  w.el.classList.toggle('wmin', w.minimized);
  if (w.minimized) { addTray(id); w.el.classList.remove('focused'); }
  else { removeTray(id); focusWin(id); }
  retile();
}

/* ── maximize ── */
function toggleMax(id) {
  const w = wins[id]; if (!w) return;
  w.maximized = !w.maximized;
  if (w.maximized) {
    w.el.classList.add('wmax');
    w.el.style.zIndex = 500;
    focusWin(id);
  } else {
    w.el.classList.remove('wmax');
    w.el.style.zIndex = '';
    focusWin(id);
  }
}

/* ── RETILE ── the core function ──
   Left box: vertical stack, each win gets flex:1 (or 30px if minimized).
   If all left wins gone → shrink leftBox to 0 width.
   Main box: same logic vertically.
*/
function retile() {
  /* left box — rispetta lo stato hidden se ws != 1 */
  const leftWins = Array.from(leftBox.children);
  const leftVisible = leftWins.filter(el => !el.classList.contains('wmin') && !el.classList.contains('wmax'));
  const leftMin     = leftWins.filter(el =>  el.classList.contains('wmin'));
  leftVisible.forEach(el => { el.style.flex = '1 1 0'; });
  leftMin.forEach(el => { el.style.flex = '0 0 30px'; });

  /* NON toccare width/opacity di leftBox qui — lo gestisce setLeftBoxVisible */

  /* active main box */
  const activeMain = wsMain[currentWs];
  if (!activeMain) return;
  const mainWins    = Array.from(activeMain.children);
  const mainVisible = mainWins.filter(el => !el.classList.contains('wmin') && !el.classList.contains('wmax'));
  const mainMin     = mainWins.filter(el =>  el.classList.contains('wmin'));
  mainVisible.forEach(el => { el.style.flex = '1 1 0'; });
  mainMin.forEach(el => { el.style.flex = '0 0 30px'; });
}

/* ── tray ── */
function addTray(id) {
  if (document.getElementById('tr'+id)) return;
  const btn = document.createElement('div');
  btn.className='tray-btn'; btn.id='tr'+id;
  btn.textContent = wins[id]?.el.querySelector('.wtitle')?.textContent?.split(' — ')[0] || id;
  btn.onclick = () => { if (wins[id]?.minimized) toggleMin(id); };
  tray.appendChild(btn);
}
function removeTray(id) { document.getElementById('tr'+id)?.remove(); }

/* ══════════════════════════════════════
   WORKSPACE SYSTEM
   ws 1 = home (neofetch + contents + about) — layout normale
   ws 2/3/4 = fullscreen, leftBox nascosto, close → torna a ws1
══════════════════════════════════════ */
const SEC_TITLES = {
  about:    "about — Hi, I'm Lorenzo",
  projects: 'projects — St0rmosu',
  blog:     'blog — lorenzo@portfolio',
  contact:  'contact — lorenzo@portfolio'
};
const WS_SEC = {'1':'about','2':'projects','3':'contact'};
const SEC_WS  = {about:'1', projects:'2', contact:'3'};

let currentWs  = '1';
let currentSec = 'about';

const wsMain = {};

function getOrCreateWsMain(ws) {
  if (wsMain[ws]) return wsMain[ws];
  const box = document.createElement('div');
  box.style.cssText = 'display:none;flex-direction:column;gap:5px;flex:1;min-width:0;min-height:0;';
  box.id = 'ws-main-'+ws;
  desktop.appendChild(box);
  wsMain[ws] = box;
  return box;
}

/* show/hide leftBox based on workspace */
function setLeftBoxVisible(visible) {
  leftBox.style.transition = 'width 0.28s cubic-bezier(.4,0,.2,1), opacity 0.22s';
  if (visible) {
    leftBox.style.width   = '320px';
    leftBox.style.opacity = '1';
    leftBox.style.overflow = '';
    leftBox.style.pointerEvents = '';
  } else {
    leftBox.style.width   = '0px';
    leftBox.style.opacity = '0';
    leftBox.style.overflow = 'hidden';
    leftBox.style.pointerEvents = 'none';
  }
}

function switchWs(ws, spawnIfNew) {
  if (ws === currentWs && !spawnIfNew) return;

  const prevWs = currentWs;
  const dir = Number(ws) > Number(prevWs) ? 'forward' : 'back';

  const doSwitch = () => {
    if (wsMain[prevWs]) {
      wsMain[prevWs].style.viewTransitionName = 'none';
      wsMain[prevWs].style.display = 'none';
    }
    currentWs = ws;
    const box = getOrCreateWsMain(ws);
    box.style.display = 'flex';
    box.style.viewTransitionName = 'ws-content';

    /* spawn section win if box empty */
    if (box.children.length === 0) {
      const sec = WS_SEC[ws];
      if (sec) {
        const winId = 's'+sec+ws;
        const el = addWin(winId, SEC_TITLES[sec], HTML[sec], box, 0);
        /* inject close button into titlebar for non-home workspaces */
        if (ws !== '1') {
          const closeBtn = document.createElement('div');
          closeBtn.innerHTML = '← back';
          closeBtn.style.cssText = 'font-size:10px;color:var(--orange);cursor:pointer;padding:0 8px;opacity:0.8;flex-shrink:0;';
          closeBtn.onmouseenter = () => closeBtn.style.opacity = '1';
          closeBtn.onmouseleave = () => closeBtn.style.opacity = '0.8';
          closeBtn.onclick = e => { e.stopPropagation(); switchWs('1', false); };
          el.querySelector('.wtbar').appendChild(closeBtn);
        }
        focusWin(winId);
      }
    }

    /* show/hide left column */
    setLeftBoxVisible(ws === '1');

    currentSec = WS_SEC[ws] || currentSec;
    updateWsBar();
    syncContentsActive();
    retile();
  };

  if (document.startViewTransition) {
    document.documentElement.dataset.vt = dir;
    if (wsMain[currentWs]) wsMain[currentWs].style.viewTransitionName = 'ws-content';
    const t = document.startViewTransition(doSwitch);
    t.finished.then(() => { delete document.documentElement.dataset.vt; });
  } else {
    doSwitch();
  }
}

function updateWsBar() {
  document.querySelectorAll('.ws-pill[data-ws]').forEach(p => {
    const w = p.dataset.ws;
    const occupied = !!(wsMain[w] && wsMain[w].children.length > 0);
    p.classList.toggle('active', w === currentWs);
    p.classList.toggle('ws-occupied', occupied);
    const sec = WS_SEC[w];
    const names = {about:'about', projects:'proj', contact:'contact'};
    p.innerHTML = `<div class="ws-dot"></div>${occupied && sec ? ' '+w+': '+names[sec] : ' '+w}`;
  });
}

function syncContentsActive() {
  document.querySelectorAll('.citem[data-open]').forEach(i =>
    i.classList.toggle('active', i.dataset.open === currentSec));
}

function openSec(sec) {
  const ws = SEC_WS[sec]; if (!ws) return;
  currentSec = sec;
  switchWs(ws, true);
  if (sec === 'projects') setTimeout(loadGitHubRepos, 100);
}

/* workspace pill clicks */
document.getElementById('ws-bar').addEventListener('click', e => {
  const pill = e.target.closest('.ws-pill[data-ws]');
  if (pill) switchWs(pill.dataset.ws, false);
});

/* Tab key — cycle */

/* ══════════════════════════════════════
   THEME ENGINE — accent + background
══════════════════════════════════════ */
const ACCENTS = {
  orange: { orange:'#e8844a', orange2:'#c06030', orange3:'#f0a060' },
  mauve:  { orange:'#cba6f7', orange2:'#9b6fd0', orange3:'#d8b4fe' },
  blue:   { orange:'#89b4fa', orange2:'#4a90d9', orange3:'#a8c8fc' },
  green:  { orange:'#a6e3a1', orange2:'#5ab57a', orange3:'#c0f0b8' },
  peach:  { orange:'#fab387', orange2:'#d08050', orange3:'#fcc8a0' },
  teal:   { orange:'#94e2d5', orange2:'#50b8a8', orange3:'#b0f0e8' },
  red:    { orange:'#f38ba8', orange2:'#c05070', orange3:'#f8b0c0' },
  yellow: { orange:'#f9e2af', orange2:'#d0b060', orange3:'#fff0c0' },
};
const BGS = {
  mocha:  { bg:'#0d0d0f', bg2:'#111114', bg3:'#16161a', border:'#252530', border2:'#353545' },
  dark:   { bg:'#0f0f1a', bg2:'#14142a', bg3:'#1a1a35', border:'#252545', border2:'#353560' },
  forest: { bg:'#080f08', bg2:'#0d160d', bg3:'#111f11', border:'#1a2e1a', border2:'#2a4028' },
  storm:  { bg:'#0a0c14', bg2:'#0e1020', bg3:'#12152a', border:'#20253a', border2:'#303550' },
  rust:   { bg:'#120a06', bg2:'#1a0e09', bg3:'#22130c', border:'#301a10', border2:'#442818' },
  ash:    { bg:'#101012', bg2:'#141416', bg3:'#18181c', border:'#242428', border2:'#343438' },
  latte:  { bg:'#eff1f5', bg2:'#e6e9ef', bg3:'#dce0e8', border:'#c0c4d0', border2:'#a0a8b8',
            text:'#4c4f69', text2:'#6c6f85', dim:'#9ca0b0' },
  frappe: { bg:'#232634', bg2:'#292c3c', bg3:'#303446', border:'#414559', border2:'#51576d' },
};

const root = document.documentElement;

function applyAccent(name) {
  const a = ACCENTS[name]; if (!a) return;
  root.style.setProperty('--orange',  a.orange);
  root.style.setProperty('--orange2', a.orange2);
  root.style.setProperty('--orange3', a.orange3);
  /* update outline on accent grid */
  document.querySelectorAll('[data-accent]').forEach(el => {
    el.style.outline = el.dataset.accent === name ? '2px solid #fff' : 'none';
  });
}

function applyBg(name) {
  const b = BGS[name]; if (!b) return;
  root.style.setProperty('--bg',      b.bg);
  root.style.setProperty('--bg2',     b.bg2);
  root.style.setProperty('--bg3',     b.bg3);
  root.style.setProperty('--border',  b.border);
  root.style.setProperty('--border2', b.border2);
  if (b.text)  { root.style.setProperty('--text',  b.text);  root.style.setProperty('--text2', b.text2); root.style.setProperty('--dim', b.dim); }
  else         { root.style.setProperty('--text',  '#c8c8d8'); root.style.setProperty('--text2','#888898'); root.style.setProperty('--dim','#50505f'); }
  document.querySelectorAll('[data-bg]').forEach(el => {
    el.style.outline = el.dataset.bg === name ? '2px solid var(--orange)' : 'none';
  });
}

/* event delegation on desktop for dynamically created picker tiles */
document.addEventListener('click', e => {
  const acc = e.target.closest('[data-accent]');
  if (acc) { applyAccent(acc.dataset.accent); return; }
  const bg = e.target.closest('[data-bg]');
  if (bg)  { applyBg(bg.dataset.bg); return; }
});

/* wallpaper overlay controls — delegated since sliders are inside dynamic window */
document.addEventListener('input', e => {
  const wp = document.getElementById('wallpaper');
  if (!wp) return;
  if (e.target.id === 'wp-dark') {
    const v = e.target.value;
    wp.querySelector('::after'); // can't query pseudo, use CSS variable instead
    wp.style.setProperty('--wp-dark', v/100);
    // update the ::after overlay via a style tag
    let st = document.getElementById('wp-style');
    if (!st) { st = document.createElement('style'); st.id='wp-style'; document.head.appendChild(st); }
    const blur = document.getElementById('wp-blur')?.value || 0;
    st.textContent = `#wallpaper::after{background:rgba(5,5,8,${v/100});backdrop-filter:blur(${blur}px)}`;
    document.getElementById('wp-dark-val').textContent = v+'%';
  }
  if (e.target.id === 'wp-blur') {
    const v = e.target.value;
    let st = document.getElementById('wp-style');
    if (!st) { st = document.createElement('style'); st.id='wp-style'; document.head.appendChild(st); }
    const dark = document.getElementById('wp-dark')?.value || 72;
    st.textContent = `#wallpaper::after{background:rgba(5,5,8,${dark/100});backdrop-filter:blur(${v}px)}`;
    document.getElementById('wp-blur-val').textContent = v+'px';
  }
});

  Java:       {cls:'bj', label:'Java'},
  Python:     {cls:'', style:'color:#8faabf;border-color:rgba(143,170,191,0.3);background:rgba(143,170,191,0.08)', label:'Python'},
  Shell:      {cls:'bb', label:'Bash'},
  JavaScript: {cls:'', style:'color:#c4a96a;border-color:rgba(196,169,106,0.3);background:rgba(196,169,106,0.08)', label:'JS'},
  TypeScript: {cls:'', style:'color:#8faabf;border-color:rgba(143,170,191,0.3);background:rgba(143,170,191,0.08)', label:'TS'},
  PHP:        {cls:'', style:'color:#d4c9b0;border-color:rgba(212,201,176,0.3);background:rgba(212,201,176,0.08)', label:'PHP'},
  CSS:        {cls:'', style:'color:#7a9e72;border-color:rgba(122,158,114,0.3);background:rgba(122,158,114,0.08)', label:'CSS'},
  HTML:       {cls:'bj', label:'HTML'},
};

function badgeHtml(lang) {
  const b = LANG_BADGE[lang];
  if (!b) return `<span class="pbadge" style="color:var(--dim);border-color:var(--border2)">${lang||'—'}</span>`;
  if (b.cls) return `<span class="pbadge ${b.cls}">${b.label}</span>`;
  return `<span class="pbadge" style="${b.style}">${b.label}</span>`;
}

async function loadGitHubRepos() {
  const grid = document.getElementById('proj-grid');
  const sub  = document.getElementById('proj-sub');
  if (!grid) return;
  try {
    const res  = await fetch('https://api.github.com/users/St0rmosu/repos?per_page=100&sort=updated');
    if (!res.ok) throw new Error('API error');
    const repos = await res.json();
    // sort by stars desc, then forks
    repos.sort((a,b) => (b.stargazers_count - a.stargazers_count) || (b.forks_count - a.forks_count));
    // filter out forks, take top 8
    const visible = repos.filter(r => !r.fork && !r.archived).slice(0, 8);
    if (visible.length === 0) throw new Error('no repos');

    if (sub) sub.textContent = `// ${repos.filter(r=>!r.fork).length} repo pubblici · ordinati per ★`;

    grid.innerHTML = visible.map(r => `
      <div class="pcard" onclick="window.open('${r.html_url}','_blank')">
        <div class="phead">
          <span class="pname2">${r.name}</span>
          ${badgeHtml(r.language)}
        </div>
        <div class="pdesc">${r.description || 'No description.'}</div>
        <div class="proj-footer" style="display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap">
          ${r.stargazers_count > 0 ? `<span style="font-size:11px;color:var(--yellow)">★ ${r.stargazers_count}</span>` : ''}
          ${r.forks_count > 0 ? `<span style="font-size:11px;color:var(--dim)">⑂ ${r.forks_count}</span>` : ''}
          ${(r.topics||[]).slice(0,3).map(t=>`<span class="ptag">${t}</span>`).join('')}
        </div>
      </div>`).join('');
  } catch(e) {
    if (sub) sub.textContent = '// repo (fallback)';
    grid.innerHTML = `
      <div class="pcard" onclick="window.open('https://github.com/St0rmosu','_blank')">
        <div class="phead"><span class="pname2">Textile Inspector</span><span class="pbadge bj">Java</span></div>
        <div class="pdesc">AI fabric defect analyzer con Java + Ollama/Gemma3:4b. Stage Galileo Italia SRL.</div>
        <div class="ptags"><span class="ptag">AI</span><span class="ptag">PCTO</span><span class="ptag">Ollama</span></div>
      </div>
      <div class="pcard" onclick="window.open('https://github.com/St0rmosu/hyprland-dots','_blank')">
        <div class="phead"><span class="pname2">Hyprland Dotfiles</span><span class="pbadge bb">Bash</span></div>
        <div class="pdesc">Setup Hyprland con tema Catppuccin Mocha, waybar, rofi, Eww e custom scripts.</div>
        <div class="ptags"><span class="ptag">Linux</span><span class="ptag">rice</span></div>
      </div>
      <div class="pcard" onclick="window.open('https://github.com/St0rmosu/Animazione-Logo-Radio','_blank')">
        <div class="phead"><span class="pname2">Manim Radio Animation</span><span class="pbadge" style="color:#8faabf;border-color:rgba(143,170,191,0.3);background:rgba(143,170,191,0.08)">Python</span></div>
        <div class="pdesc">Animazione Manim per la web radio scolastica. Creatività + codice.</div>
        <div class="ptags"><span class="ptag">Manim</span><span class="ptag">animation</span></div>
      </div>
      <div class="pcard" onclick="window.open('https://sitogpo.vercel.app','_blank')">
        <div class="phead"><span class="pname2">RE-LIFE (GPO)</span><span class="pbadge bw">Web</span></div>
        <div class="pdesc">Sito web + business plan startup upcycling mobili. Progetto GPO su Vercel.</div>
        <div class="ptags"><span class="ptag">GPO</span><span class="ptag">Vercel</span></div>
      </div>`;
  }
}

  document.getElementById('clock').innerHTML=h+':'+m+'<span class="blink">_</span>';
}
